<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - Dapur Singkong</title>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              darkbrown: "#4E2A1E",
              brown: "#8B5A2B",
              orange: "#F59E0B",
              cream: "#FFF8E7",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-cream font-sans">
    <div class="min-h-screen grid lg:grid-cols-2">
      <!-- Left Side -->
      <div
        class="hidden lg:flex flex-col justify-center px-16 bg-darkbrown text-white relative overflow-hidden">
        <div
          class="absolute top-0 right-0 w-72 h-72 bg-orange/10 rounded-full blur-3xl"></div>

        <div class="relative z-10 max-w-md">
          <h1 class="text-5xl font-bold leading-tight mb-4">Dashboard Kasir</h1>
          <p class="text-white/70 text-lg leading-relaxed">
            Kelola pesanan, stok produk, dan laporan penjualan Dapur Singkong
            dalam satu dashboard yang sederhana dan mudah digunakan.
          </p>
        </div>
      </div>

      <!-- Right Side -->
      <div class="flex items-center justify-center p-6">
        <div
          class="bg-white w-full max-w-md rounded-3xl shadow-xl border border-gray-100 p-8">
          <div class="text-center mb-8">
            <img
              src="../assets/logo.png"
              alt="Logo"
              class="w-20 mx-auto mb-4" />

            <h2 class="text-3xl font-bold text-darkbrown">Login Admin</h2>

            <p class="text-sm text-brown mt-2">Masuk ke Dashboard Kasir</p>
          </div>

          <form id="login-form" class="space-y-5">
            <div>
              <label class="block text-sm font-medium mb-2 text-darkbrown">
                Username
              </label>

              <input
                type="text"
                id="username"
                placeholder="Masukkan username"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange focus:ring-2 focus:ring-orange/20 outline-none" />
            </div>

            <div>
              <label class="block text-sm font-medium mb-2 text-darkbrown">
                Password
              </label>

              <input
                type="password"
                id="password"
                placeholder="Masukkan password"
                class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange focus:ring-2 focus:ring-orange/20 outline-none" />
            </div>

            <p id="error-msg" class="hidden text-red-500 text-sm">
              Username atau password salah
            </p>

            <button
              type="submit"
              class="w-full py-3 bg-darkbrown text-white rounded-xl font-semibold hover:bg-brown transition">
              Masuk Dashboard
            </button>
          </form>

          <div class="mt-6 text-center">
            <a
              href="../../index.html"
              class="text-sm text-brown hover:text-orange transition">
              ← Kembali ke Website Customer
            </a>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="../../js/cashier/cashier-login.js"></script>
  </body>
</html>
