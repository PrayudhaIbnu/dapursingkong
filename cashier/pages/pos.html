<div class="h-[calc(100vh-80px)] flex overflow-hidden">
  <!-- PRODUCT AREA -->
  <section class="flex-1 flex flex-col bg-gray-50">
    <!-- Toolbar -->
    <div class="p-6 bg-white border-b">
      <div class="flex flex-col lg:flex-row gap-4">
        <div class="flex-1 relative">
          <i
            data-lucide="search"
            class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>

          <input
            id="pos-search"
            type="text"
            placeholder="Cari menu..."
            class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:border-orange outline-none" />
        </div>

        <button
          class="px-5 py-3 bg-orange text-white rounded-xl font-semibold flex items-center gap-2">
          <i data-lucide="plus"></i>
          Pesanan Baru
        </button>
      </div>

      <div
        id="category-filters"
        class="flex gap-2 mt-4 overflow-x-auto pb-2"></div>
    </div>

    <!-- Product Grid -->
    <div class="flex-1 overflow-y-auto p-6">
      <div
        id="pos-product-grid"
        class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        <!-- Inject JS -->
      </div>
    </div>
  </section>

  <!-- CART -->
  <aside class="w-[380px] bg-white border-l border-gray-200 flex flex-col">
    <!-- Customer -->
    <div class="p-5 border-b">
      <h2 class="font-bold text-lg mb-4">Pesanan Aktif</h2>

      <input
        id="pos-customer-name"
        type="text"
        placeholder="Nama Pelanggan"
        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-orange outline-none" />
    </div>

    <!-- Cart Items -->
    <div id="pos-cart-items" class="flex-1 overflow-y-auto p-5 space-y-3">
      <div class="text-center py-16">
        <div
          class="w-16 h-16 mx-auto rounded-full bg-orange/10 flex items-center justify-center mb-3">
          <i data-lucide="shopping-cart" class="w-8 h-8 text-orange"></i>
        </div>

        <p class="text-gray-500">Belum ada pesanan</p>
      </div>
    </div>

    <!-- Summary -->
    <div class="p-5 border-t bg-gray-50 space-y-4">
      <div class="flex justify-between">
        <span class="text-gray-500"> Subtotal </span>

        <span id="pos-subtotal"> Rp 0 </span>
      </div>

      <div class="flex justify-between text-xl font-bold">
        <span>Total</span>

        <span id="pos-total" class="text-orange"> Rp 0 </span>
      </div>

      <!-- Payment -->
      <div class="grid grid-cols-2 gap-3">
        <button
          class="pos-payment-btn bg-orange text-white rounded-xl py-3 font-semibold"
          data-method="cash">
          Cash
        </button>

        <button
          class="pos-payment-btn border rounded-xl py-3 font-semibold"
          data-method="qris">
          QRIS
        </button>
      </div>

      <button
        id="pos-checkout-btn"
        class="w-full py-4 bg-darkbrown text-white rounded-xl font-bold text-lg hover:bg-brown transition">
        Bayar Sekarang
      </button>
    </div>
  </aside>
</div>
