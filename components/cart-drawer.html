<!-- Overlay -->
<div id="cart-overlay" class="fixed inset-0 bg-black/50 z-[60] hidden transition-opacity"></div>

<!-- Drawer -->
<div id="cart-drawer" class="drawer fixed top-0 right-0 h-full w-full max-w-md bg-cream z-[70] shadow-2xl flex flex-col">
    <div class="p-6 border-b border-brown/20 flex justify-between items-center">

        <button id="close-cart" class="p-2 hover:bg-white rounded-full">✕</button>

    <div class="p-6 bg-white border-t border-brown/20">

        </div>
