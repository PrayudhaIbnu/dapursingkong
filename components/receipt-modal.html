<div
  id="receipt-modal"
  class="modal-backdrop fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/70">
  <div
    class="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto relative">
    <button
      id="close-receipt"
      class="absolute top-4 right-4 p-2 hover:bg-gray-100 rounded-full no-print">
      ✕
    </button>

    <div id="receipt-content" class="p-8">
      <!-- Header -->
      <div
        class="text-center border-b-2 border-dashed border-brown/20 pb-6 mb-6">
        <div
          class="w-16 h-16 bg-darkbrown rounded-full flex items-center justify-center text-3xl mx-auto mb-3 text-cream">
          🍠
        </div>
        <h2 class="font-display text-2xl font-bold text-darkbrown">
          Dapur Singkong
        </h2>
        <p class="text-sm text-brown">Struk Pembayaran Digital</p>
      </div>

      <!-- Info -->
      <div class="space-y-3 text-sm mb-6">
        <div class="flex justify-between">
          <span class="text-brown">No. Invoice</span>
          <span id="r-invoice" class="font-bold">-</span>
        </div>

        <div class="flex justify-between">
          <span class="text-brown">Nomor Antrian</span>
          <span id="r-queue" class="font-bold text-orange"> - </span>
        </div>

        <div class="flex justify-between">
          <span class="text-brown">Tanggal</span>
          <span id="r-date" class="font-bold">-</span>
        </div>

        <div class="flex justify-between">
          <span class="text-brown">Pembeli</span>
          <span id="r-name" class="font-bold">-</span>
        </div>

        <div class="flex justify-between">
          <span class="text-brown">Metode</span>
          <span id="r-method" class="font-bold">-</span>
        </div>
      </div>

      <!-- Items -->
      <div class="border-t border-brown/10 pt-4 mb-4">
        <h4 class="font-bold mb-3">Detail Item</h4>
        <div id="r-items" class="space-y-2 text-sm"></div>
      </div>

      <!-- Total -->
      <div
        class="flex justify-between items-center pt-4 border-t-2 border-darkbrown">
        <span class="font-bold text-lg">TOTAL</span>
        <span id="r-total" class="font-bold text-xl text-orange">Rp 0</span>
      </div>

      <!-- Status -->
      <div
        id="r-status"
        class="mt-6 p-3 rounded-lg text-center font-bold text-sm"></div>
    </div>

    <!-- Actions -->
    <div class="p-6 bg-cream rounded-b-3xl flex gap-3 no-print">
      <button
        onclick="window.print()"
        class="flex-1 py-3 bg-darkbrown text-cream rounded-xl font-bold hover:bg-brown transition">
        Print
      </button>
      <button
        id="download-pdf"
        class="flex-1 py-3 bg-orange text-white rounded-xl font-bold hover:bg-orange/90 transition">
        PDF
      </button>
      <button
        id="new-order"
        class="flex-1 py-3 bg-brown text-cream rounded-xl font-bold hover:bg-darkbrown transition">
        Baru
      </button>
    </div>
  </div>
</div>
