<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dapur Singkong</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- SDK -->
    <script src="/_sdk/element_sdk.js"></script>
    <script src="/_sdk/data_sdk.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              darkbrown: "#4E2A1E",
              brown: "#8B5A2B",
              orange: "#F59E0B",
              cream: "#FFF8E7",
              brandwhite: "#FFFFFF",
            },
            fontFamily: {
              display: ["Playfair Display", "serif"],
              sans: ["Poppins", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-cream text-darkbrown font-sans">
    <!-- Loader -->
    <div
      id="loader"
      class="fixed inset-0 bg-darkbrown z-[9999] flex items-center justify-center">
      <div class="text-center">
        <div
          class="w-16 h-16 border-4 border-cream/20 border-t-orange rounded-full animate-spin mx-auto mb-4"></div>

        <p class="text-cream font-display text-xl">Dapur Singkong</p>
      </div>
    </div>

    <!-- App -->
    <div id="app"></div>

    <!-- Toast -->
    <div
      id="toast-container"
      class="fixed top-24 right-5 z-[9998] flex flex-col gap-2"></div>

    <!-- Main Script -->
    <script type="module" src="js/app.js"></script>
  </body>
</html>
